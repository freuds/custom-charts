version: '3'

tasks:
  default:
    desc: "Display all available tasks for this project"
    silent: true
    cmds:
      - task --list-all

  generate:
    desc: Generate Helm charts
    silent: true
    cmds:
      - |
        for chart in charts/*/Chart.yaml; do
          chart_dir=$(dirname "$chart")
          helm dependency update "$chart_dir" || true
          helm package "$chart_dir" -d docs/
        done
      - helm repo index docs/ --url "https://freuds.github.io/custom-charts/" --merge docs/index.yaml
      - task: generate-index-md

  lint:
    desc: Lint Helm charts
    silent: true
    cmds:
      - ct lint --config charts/ct.yaml

  lint-all:
    desc: Lint et valide dynamiquement tous les charts listés dans chart-dirs de ct.yaml
    silent: true
    cmds:
      - task: lint
      - |
        for chart in $(yq '.chart-dirs[]' charts/ct.yaml); do
          helm lint charts/$chart
          helm template charts/$chart | \
            kubeconform -kubernetes-version 1.35.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -skip Certificate,Issuer
        done

  update-deps:
    desc: Update Helm dependencies
    silent: true
    cmds:
      - |
        for chart in $(yq '.chart-dirs[]' charts/ct.yaml); do
          helm dependency update charts/$chart
        done

  generate-index-md:
    desc: Generate index.md from index.yaml
    internal: true
    silent: true
    cmds:
      - |
        cat > docs/index.md << 'EOF'
        # custom-charts

        ## Charts disponibles

        EOF
      - |
        yq '.entries | keys[]' docs/index.yaml | while read chart; do
          version=$(yq ".entries.$chart[0].version" docs/index.yaml)
          description=$(yq ".entries.$chart[0].description" docs/index.yaml)
          appVersion=$(yq ".entries.$chart[0].appVersion" docs/index.yaml)
          echo "### $chart" >> docs/index.md
          echo "" >> docs/index.md
          echo "- **Description** : $description" >> docs/index.md
          echo "- **Version** : $version" >> docs/index.md
          echo "- **AppVersion** : $appVersion" >> docs/index.md
          echo "" >> docs/index.md
        done
      - |
        cat >> docs/index.md << 'EOF'
        ## Utilisation du repo Helm

        ```sh
        helm repo add custom-charts https://freuds.github.io/custom-charts
        ```
        EOF
